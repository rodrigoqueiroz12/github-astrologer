services:
  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      VITE_API_BASE_URL: http://backend:80
      VITE_USE_MOCK: "false"
    depends_on:
      - backend
    networks:
      - app

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8000:80"
    environment:
      APP_NAME: AstrologerDev
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: astrologer
      DB_USERNAME: sail
      DB_PASSWORD: secret
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      LOG_CHANNEL: stderr
      GITHUB_API_URL: https://api.github.com
      GITHUB_API_VERSION: "2022-11-28"
      GITHUB_API_KEY: ${GITHUB_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FRONTEND_URL: http://localhost:5173
      SANCTUM_STATEFUL_DOMAINS: "localhost,localhost:5173,127.0.0.1,127.0.0.1:5173"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: astrologer
      MYSQL_USER: sail
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-psecret"]
      retries: 3
      timeout: 5s

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s

networks:
  app:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
